<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACARS Flight Tracker — 5H4RK</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100vh; overflow:hidden; background:#0a0e14; color:#c8d8e8; font-family:'Barlow Condensed',sans-serif; }

/* Layout */
#header { position:fixed; top:0; left:0; right:0; height:48px; background:#0d1117; border-bottom:1px solid #1a2332; display:flex; align-items:center; padding:0 16px; gap:20px; z-index:1000; }
#sidebar { position:fixed; top:48px; left:0; bottom:0; width:280px; background:#0d1117; border-right:1px solid #1a2332; overflow-y:auto; z-index:999; }
#detail { position:fixed; top:48px; right:0; bottom:0; width:320px; background:#0d1117; border-left:1px solid #1a2332; overflow-y:auto; z-index:999; }
#map { position:fixed; top:48px; left:280px; right:320px; bottom:0; }

/* Header */
.logo { font-family:'Share Tech Mono',monospace; font-size:16px; color:#00d4ff; letter-spacing:2px; }
.logo span { color:#ff6b35; }
.hstat { display:flex; flex-direction:column; }
.hstat-label { font-size:9px; color:#4a6080; letter-spacing:2px; text-transform:uppercase; }
.hstat-value { font-family:'Share Tech Mono',monospace; font-size:14px; color:#00d4ff; }
.btn { background:transparent; border:1px solid #00d4ff; color:#00d4ff; font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:600; letter-spacing:1px; padding:5px 14px; cursor:pointer; text-transform:uppercase; }
.btn:hover { background:#00d4ff; color:#0a0e14; }
.btn-orange { border-color:#ff6b35; color:#ff6b35; }
.btn-orange:hover { background:#ff6b35; color:#0a0e14; }
.btn-green { border-color:#39ff14; color:#39ff14; display:none; }
.btn-green:hover { background:#39ff14; color:#0a0e14; }
.btn-green.active { background:#39ff14; color:#0a0e14; }

/* Sidebar */
.section-title { padding:8px 12px; font-size:9px; letter-spacing:2px; color:#4a6080; text-transform:uppercase; border-bottom:1px solid #1a2332; display:flex; justify-content:space-between; }
.flight-card { padding:10px 12px; border-bottom:1px solid #1a2332; cursor:pointer; transition:background 0.1s; }
.flight-card:hover, .flight-card.active { background:rgba(0,212,255,0.07); border-left:2px solid #00d4ff; }
.flight-callsign { font-size:16px; font-weight:700; color:#fff; }
.flight-reg { font-family:'Share Tech Mono',monospace; font-size:10px; color:#00d4ff; }
.flight-route { font-size:12px; color:#c8d8e8; margin-top:2px; font-weight:600; }
.flight-meta { font-size:10px; color:#4a6080; margin-top:3px; display:flex; justify-content:space-between; }
.pos-badge { background:#39ff14; color:#0a0e14; font-size:9px; font-weight:700; padding:1px 5px; }
.empty { padding:20px; text-align:center; color:#4a6080; font-size:12px; letter-spacing:1px; line-height:2; }

/* Detail panel */
.detail-tabs { display:flex; border-bottom:1px solid #1a2332; }
.dtab { flex:1; padding:8px; font-size:10px; letter-spacing:1px; text-transform:uppercase; color:#4a6080; cursor:pointer; text-align:center; border-bottom:2px solid transparent; }
.dtab.active { color:#00d4ff; border-bottom-color:#00d4ff; }
.tab-pane { display:none; padding:12px; }
.tab-pane.active { display:block; }
.drow { display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #1a2332; font-size:12px; }
.drow-label { color:#4a6080; }
.drow-value { font-family:'Share Tech Mono',monospace; font-size:11px; color:#c8d8e8; text-align:right; }
.dsection { font-size:9px; letter-spacing:2px; color:#4a6080; text-transform:uppercase; margin:10px 0 5px; padding-bottom:3px; border-bottom:1px solid #1a2332; }
.msg-block { padding:8px; background:#080c10; border-left:2px solid #1a2332; margin-bottom:6px; }
.msg-block.pos { border-left-color:#39ff14; }
.msg-block.fuel { border-left-color:#ffcc00; }
.msg-block.engine { border-left-color:#ff6b35; }
.msg-time { font-family:'Share Tech Mono',monospace; font-size:9px; color:#4a6080; margin-bottom:3px; }
.msg-label { display:inline-block; font-size:9px; font-weight:700; padding:1px 5px; background:#1a2332; color:#c8d8e8; margin-bottom:3px; }
.msg-body { font-family:'Share Tech Mono',monospace; font-size:10px; color:#4a6080; word-break:break-all; line-height:1.4; }

/* Drop overlay */
#drop-overlay { position:absolute; inset:0; background:rgba(10,14,20,0.95); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; z-index:10; border:2px dashed #1a2332; }
#drop-overlay.drag { border-color:#00d4ff; }
.drop-icon { font-size:40px; opacity:0.4; }
.drop-title { font-size:24px; font-weight:700; letter-spacing:2px; color:#4a6080; }
.drop-sub { font-family:'Share Tech Mono',monospace; font-size:11px; color:#4a6080; }

/* Map tiles dark */
.leaflet-tile { filter:invert(1) hue-rotate(180deg) brightness(0.75) saturate(0.4); }
.leaflet-container { background:#0a0e14 !important; }
.leaflet-control-attribution { display:none; }
.leaflet-control-zoom a { background:#0d1117 !important; color:#c8d8e8 !important; border-color:#1a2332 !important; }
.dark-popup .leaflet-popup-content-wrapper { background:#0d1117; color:#c8d8e8; border:1px solid #1a2332; border-radius:0; box-shadow:none; }
.dark-popup .leaflet-popup-tip { background:#0d1117; }

#sidebar::-webkit-scrollbar, #detail::-webkit-scrollbar { width:3px; }
#sidebar::-webkit-scrollbar-thumb, #detail::-webkit-scrollbar-thumb { background:#1a2332; }
</style>
</head>
<body>

<div id="header">
  <div class="logo">5H4RK/<span>ACARS</span></div>
  <div class="hstat"><div class="hstat-label">Flights</div><div class="hstat-value" id="s-flights">0</div></div>
  <div class="hstat"><div class="hstat-label">Messages</div><div class="hstat-value" id="s-msgs">0</div></div>
  <div class="hstat"><div class="hstat-label">Duration</div><div class="hstat-value" id="s-dur">--</div></div>
  <div class="hstat"><div class="hstat-label">Top Freq</div><div class="hstat-value" id="s-freq">--</div></div>
  <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
    <div style="width:8px;height:8px;border-radius:50%;background:#4a6080" id="s-dot"></div>
    <button class="btn btn-orange" id="btn-clear" onclick="clearAll()" style="display:none">Clear</button>
    <button class="btn btn-green" id="btn-all" onclick="toggleAll()">Show All</button>
    <label class="btn" for="file-input">Load Log</label>
    <input type="file" id="file-input" accept=".txt,.log" style="display:none">
  </div>
</div>

<div id="sidebar">
  <div class="section-title">Tracked Flights <span id="flight-count">0</span></div>
  <div id="flight-list"><div class="empty">LOAD AN ACARSDEC LOG FILE<br><span style="font-size:10px">drag & drop or click Load Log</span></div></div>
</div>

<div id="map">
  <div id="drop-overlay">
    <div class="drop-icon">📡</div>
    <div class="drop-title">DROP LOG FILE</div>
    <div class="drop-sub">acarsdec .txt or .log format</div>
    <label class="btn" for="file-input" style="margin-top:8px">Browse Files</label>
  </div>
</div>

<div id="detail">
  <div class="detail-tabs">
    <div class="dtab active" data-tab="info">Info</div>
    <div class="dtab" data-tab="decoded">Decoded</div>
    <div class="dtab" data-tab="timeline">Timeline</div>
    <div class="dtab" data-tab="raw">Raw</div>
    <div class="dtab" data-tab="chart">Chart</div>
  </div>
  <div class="tab-pane active" id="tab-info"><div class="empty">SELECT A FLIGHT</div></div>
  <div class="tab-pane" id="tab-decoded"><div class="empty">SELECT A FLIGHT</div></div>
  <div class="tab-pane" id="tab-timeline"><div class="empty">SELECT A FLIGHT</div></div>
  <div class="tab-pane" id="tab-raw"><div class="empty">SELECT A FLIGHT</div></div>
  <div class="tab-pane" id="tab-chart"><div class="empty">SELECT A FLIGHT</div></div>
</div>

<script>
// ── AIRPORTS ─────────────────────────────────────────────────────
const AIRPORTS = {
  'KJFK':[40.6413,-73.7781],'KPHL':[39.8721,-75.2411],'KIAD':[38.9531,-77.4565],
  'KBOS':[42.3656,-71.0096],'KATL':[33.6407,-84.4277],'KLAX':[33.9425,-118.4081],
  'KORD':[41.9742,-87.9073],'KMIA':[25.7959,-80.2870],'KDFW':[32.8998,-97.0403],
  'KEWR':[40.6895,-74.1745],'KCLT':[35.2140,-80.9431],'KDCA':[38.8521,-77.0377],
  'KBWI':[39.1754,-76.6683],'KCMH':[39.9980,-82.8919],'KPIT':[40.4915,-80.2329],
  'CYUL':[45.4706,-73.7408],'CYYZ':[43.6777,-79.6248],'CYYC':[51.1215,-114.0133],
  'SKBO':[4.7016,-74.1469],'SEGU':[-2.1574,-79.8836],'SBGR':[-23.4356,-46.4731],
  'EGLL':[51.4775,-0.4614],'LFPG':[49.0097,2.5479],'LEMD':[40.4719,-3.5626],
  'EDDF':[50.0379,8.5622],'LIRF':[41.8003,12.2389],'EHAM':[52.3086,4.7639],
};

// ── STATE ─────────────────────────────────────────────────────────
let flights = {}, selected = null, map, layers = {}, markers = {}, showAll = false;

// ── MAP ───────────────────────────────────────────────────────────
function initMap() {
  map = L.map('map', { zoomControl:true, attributionControl:false, minZoom:3 });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom:18, subdomains:'abc'
  }).addTo(map);
  map.setView([39.5,-76], 7);

  // Drag and drop
  const m = document.getElementById('map');
  m.addEventListener('dragover', e => { e.preventDefault(); document.getElementById('drop-overlay').classList.add('drag'); });
  m.addEventListener('dragleave', () => document.getElementById('drop-overlay').classList.remove('drag'));
  m.addEventListener('drop', e => { e.preventDefault(); if(e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
}

// ── PARSE ─────────────────────────────────────────────────────────
function parseLog(text) {
  flights = {};
  const lines = text.split('\n');
  let cur = null, body = [];

  function save() {
    if (!cur) return;
    cur.body = body.join('\n').trim();
    if (cur.reg) ingest(cur);
    cur = null; body = [];
  }

  for (const line of lines) {
    const hm = line.match(/\[#(\d+)\s+\(F:([\d.]+)\s+L:([-\d.]+)\s+E:(\d+)\)\s+([\d/]+\s+[\d:.]+)/);
    if (hm) { save(); cur = { ch:hm[1], freq:+hm[2], lvl:+hm[3], err:+hm[4], ts:hm[5], label:null, reg:null, flight:null, no:null }; continue; }
    if (!cur) continue;
    const lm = line.match(/Mode\s*:\s*\S+\s+Label\s*:\s*(\S+)/); if(lm) cur.label=lm[1];
    const rm = line.match(/Aircraft reg:\s*(\S+)\s+Flight id:\s*(\S+)/); if(rm){cur.reg=rm[1];cur.flight=rm[2];}
    const nm = line.match(/^No:\s*(\S+)/); if(nm) cur.no=nm[1];
    if (!line.match(/^Mode|^Aircraft|^No:|^-{5}/)) body.push(line);
  }
  save();
}

function ingest(msg) {
  const k = msg.reg;
  if (!flights[k]) flights[k] = { reg:msg.reg, flight:msg.flight, msgs:[], pos:[], route:null, origin:null, dest:null, maxAlt:0, first:msg.ts, last:msg.ts, freqs:{} };
  const f = flights[k];
  f.msgs.push(msg);
  f.last = msg.ts;
  f.freqs[msg.freq] = (f.freqs[msg.freq]||0)+1;

  const b = msg.body||'';

  // Extract route
  const rt = b.match(/([A-Z]{4})\/([A-Z]{4})/);
  if (rt) { f.origin=rt[1]; f.dest=rt[2]; f.route=rt[1]+'→'+rt[2]; }

  // Destination from label 36
  if ((msg.label==='36'||msg.label==='37')) {
    const csv=b.trim().split(',');
    if(csv.length>=6&&csv[5].trim().match(/^K[A-Z]{3}$/)) { f.dest=csv[5].trim(); if(!f.route) f.route='→'+f.dest; }
  }

  // Position parsing — all formats
  let lat=null,lon=null,alt=null,hdg=null,tas=null,fob=null,eta=null,mach=null;

  // Label 80: /POS NxxxxWyyyy /FL nnn
  if (msg.label==='80') {
    const pm=b.match(/\/POS\s+([NS])([\d.]+)([EW])([\d.]+)/);
    if(pm){lat=(pm[1]==='S'?-1:1)*+pm[2];lon=(pm[3]==='W'?-1:1)*+pm[4];}
    const fl=b.match(/\/FL\s+(\d+)/); if(fl)alt=+fl[1]*100;
    const ta=b.match(/\/TAS\s+(\d+)/); if(ta)tas=+ta[1];
    const fb=b.match(/\/FOB\s+[NP]([\d]+)/); if(fb)fob=+fb[1];
    const et=b.match(/\/ETA\s+([\d:.]+)/); if(et)eta=et[1];
    const hd=b.match(/\/HDG\s+(\d+)/); if(hd)hdg=+hd[1];
    const mc=b.match(/\/MCH\s+(\d+)/); if(mc)mach=(+mc[1]/1000).toFixed(3);
  }

  // Label 16: N xx.xxx, W yy.yyy, alt
  if (msg.label==='16') {
    const pm=b.match(/[NS]\s*([\d.]+)\s*,\s*[EW]\s*([\d.]+)\s*,\s*(\d+)/);
    if(pm){lat=+pm[1];lon=-+pm[2];alt=+pm[3];}
    // Also try: waypoint,N lat,W lon,alt format
    const pm2=b.match(/N\s+([\d.]+),\s*W\s+([\d.]+),\s*(\d+)/);
    if(pm2){lat=+pm2[1];lon=-+pm2[2];alt=+pm2[3];}
  }

  // Label 21: POSN lat[NS] lon[EW] hdg,time,alt
  if (msg.label==='21') {
    const pm=b.match(/POSN\s+([\d.]+)([NS])\s+([\d.]+)([EW])\s*,\s*(\d+),\s*\d+,\s*(\d+)/);
    if(pm){lat=(pm[2]==='S'?-1:1)*+pm[1];lon=(pm[4]==='W'?-1:1)*+pm[3];hdg=+pm[5];alt=+pm[6];}
    const dm=b.match(/([A-Z]{4})\s*$/); if(dm&&dm[1].match(/^K/)){f.dest=dm[1];if(!f.route)f.route='→'+dm[1];}
  }

  // Label 22: N DDMMSS W DDDMMSS
  if (msg.label==='22') {
    const pm=b.match(/([NS])\s+(\d{2})(\d{2})(\d{2})\s*([EW])\s+(\d{2,3})(\d{2})(\d{2})/);
    if(pm){
      lat=(pm[1]==='S'?-1:1)*(+pm[2]+(+pm[3]/60)+(+pm[4]/3600));
      lon=(pm[5]==='W'?-1:1)*(+pm[6]+(+pm[7]/60)+(+pm[8]/3600));
      const am=b.match(/,(\d{5}),/); if(am)alt=+am[1];
    }
  }

  // Label 36/37: CSV lat,lon,alt
  if (msg.label==='36'||msg.label==='37') {
    const csv=b.trim().split(',');
    if(csv.length>=11){lat=+csv[6];lon=+csv[7];alt=+csv[10]*100;if(csv[13]){}; if(csv[14])fob=+csv[14];}
  }

  // Label 83: ...NddMM.MWdddMM.M...
  if (msg.label==='83') {
    const pm=b.match(/([NS])(\d{2})(\d{2}\.\d+)([EW])(\d{2,3})(\d{2}\.\d+)/);
    if(pm){lat=(pm[1]==='S'?-1:1)*(+pm[2]+(+pm[3]/60));lon=(pm[4]==='W'?-1:1)*(+pm[5]+(+pm[6]/60));}
  }

  if (lat!==null&&lon!==null&&!isNaN(lat)&&!isNaN(lon)&&Math.abs(lat)<=90&&Math.abs(lon)<=180) {
    f.pos.push({lat,lon,alt,hdg,tas,fob,eta,mach,ts:msg.ts,label:msg.label});
    if(alt&&alt>f.maxAlt)f.maxAlt=alt;
  }
}

// ── RENDER FLIGHTS LIST ───────────────────────────────────────────
function renderList() {
  const keys = Object.keys(flights).sort((a,b)=>flights[b].msgs.length-flights[a].msgs.length);
  document.getElementById('flight-count').textContent = keys.length;
  document.getElementById('flight-list').innerHTML = keys.length ? keys.map(k=>{
    const f=flights[k];
    return `<div class="flight-card ${selected===k?'active':''}" onclick="select('${k}')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="flight-callsign">${f.flight}</span>
        <span style="font-size:10px;color:#4a6080">${f.msgs.length} msg</span>
      </div>
      <div class="flight-reg">${f.reg}</div>
      ${f.route?`<div class="flight-route">${f.route}</div>`:''}
      <div class="flight-meta">
        <span>${f.first.split(' ')[1]?.slice(0,8)||''}</span>
        <span>${f.pos.length?`<span class="pos-badge">📍 ${f.pos.length} pos</span>`:'no position'}</span>
      </div>
    </div>`;
  }).join('') : '<div class="empty">NO FLIGHTS DECODED</div>';
}

// ── SELECT FLIGHT ─────────────────────────────────────────────────
function select(key) {
  selected = key;
  showAll = false;
  document.getElementById('btn-all').classList.remove('active');
  document.getElementById('btn-all').textContent = 'Show All';
  renderList();
  renderMap(key);
  renderDetail(key);
}

// ── MAP RENDERING ─────────────────────────────────────────────────
function clearMap() {
  Object.values(layers).forEach(l=>map.removeLayer(l));
  Object.values(markers).forEach(m=>map.removeLayer(m));
  layers={}; markers={};
}

function altColor(alt) {
  if(!alt) return '#00d4ff';
  if(alt<5000) return '#39ff14';
  if(alt<15000) return '#ffcc00';
  if(alt<25000) return '#00d4ff';
  if(alt<35000) return '#7b68ee';
  return '#ff6b35';
}

function trackBearing(p1, p2) {
  const toRad = d => d * Math.PI / 180;
  const y = Math.sin(toRad(p2.lon - p1.lon)) * Math.cos(toRad(p2.lat));
  const x = Math.cos(toRad(p1.lat)) * Math.sin(toRad(p2.lat)) -
             Math.sin(toRad(p1.lat)) * Math.cos(toRad(p2.lat)) * Math.cos(toRad(p2.lon - p1.lon));
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function airplaneIcon(color, hdg) {
  const safeColor = /^#[0-9a-fA-F]{3,8}$/.test(color) ? color : '#00d4ff';
  return L.divIcon({
    html: `<div style="transform:rotate(${hdg||0}deg);width:38px;height:38px;display:flex;align-items:center;justify-content:center">
      <svg width="38" height="38" viewBox="0 0 38 38">
        <rect x="17" y="6" width="4" height="26" rx="2" fill="${safeColor}"/>
        <path d="M19 16 L4 24 L4 22 L19 14 L34 22 L34 24 Z" fill="${safeColor}"/>
        <path d="M19 28 L12 34 L12 32 L19 26 L26 32 L26 34 Z" fill="${safeColor}"/>
      </svg>
    </div>`,
    className: '',
    iconAnchor: [19, 19]
  });
}

function renderMap(key) {
  clearMap();
  map.invalidateSize();
  const f = flights[key];
  if (!f.pos.length) {
    // No positions — show destination if known
    const dest = f.dest ? AIRPORTS[f.dest] : null;
    if (dest) {
      const m = L.circleMarker(dest, {radius:8,color:'#ffcc00',fillColor:'#ffcc00',fillOpacity:0.3,weight:2})
        .bindPopup(`<div style="font-family:monospace;font-size:11px;background:#0d1117;color:#c8d8e8;padding:8px"><b style="color:#ffcc00">DESTINATION: ${f.dest}</b><br>No position data received</div>`,{className:'dark-popup'})
        .addTo(map);
      markers['dest']=m;
      map.setView(dest, 7);
    }
    return;
  }

  const coords = f.pos.map(p=>[p.lat,p.lon]);

  // Draw path segments colored by altitude
  for(let i=0;i<coords.length-1;i++){
    const seg=L.polyline([coords[i],coords[i+1]],{color:altColor(f.pos[i].alt),weight:3,opacity:0.9}).addTo(map);
    layers['s'+i]=seg;
  }

  // Position markers
  f.pos.forEach((p,i)=>{
    const isFirst=i===0, isLast=i===f.pos.length-1;
    const color=isFirst?'#39ff14':isLast?altColor(p.alt):'#00d4ff';
    const r=(isFirst||isLast)?9:5;
    const popup=`<div style="font-family:monospace;font-size:11px;background:#0d1117;color:#c8d8e8;padding:8px;min-width:150px">
      <b style="color:${color}">${f.flight} · ${p.ts.split(' ')[1]||''}</b><br>
      ${p.alt?`Alt: <b>${p.alt.toLocaleString()} ft</b><br>`:''}
      ${p.tas?`Speed: ${p.tas} kts<br>`:''}
      ${p.hdg != null?`Heading: ${p.hdg}°<br>`:''}
      ${p.fob?`Fuel: ${p.fob.toLocaleString()} lbs<br>`:''}
      ${p.eta?`ETA: ${p.eta} UTC<br>`:''}
      <span style="color:#4a6080;font-size:9px">✅ CONFIRMED by your SDR</span>
    </div>`;
    let m;
    if (isLast) {
      const hdg = p.hdg != null ? p.hdg : (f.pos.length >= 2 ? trackBearing(f.pos[f.pos.length-2], p) : 0);
      m=L.marker([p.lat,p.lon],{icon:airplaneIcon(color,hdg)})
        .bindPopup(popup,{className:'dark-popup'}).addTo(map);
    } else {
      m=L.circleMarker([p.lat,p.lon],{radius:r,color,fillColor:color,fillOpacity:1,weight:2})
        .bindPopup(popup,{className:'dark-popup'}).addTo(map);
    }
    markers['p'+i]=m;
  });

  // Projected path to destination
  const lastP = f.pos[f.pos.length-1];
  const destCoords = f.dest ? AIRPORTS[f.dest] : null;
  if (destCoords) {
    const proj=L.polyline([[lastP.lat,lastP.lon],destCoords],{color:'#4a6080',weight:2,opacity:0.6,dashArray:'8 6'}).addTo(map);
    layers['proj']=proj;
    const dm=L.circleMarker(destCoords,{radius:7,color:'#ffcc00',fillColor:'#ffcc00',fillOpacity:0.25,weight:2})
      .bindPopup(`<div style="font-family:monospace;font-size:11px;background:#0d1117;color:#c8d8e8;padding:8px">
        <b style="color:#ffcc00">🏁 ${f.dest}</b><br>
        ${lastP.eta?`ETA: ${lastP.eta} UTC<br>`:''}
        <span style="color:#4a6080;font-size:9px">Projected destination</span>
      </div>`,{className:'dark-popup'}).addTo(map);
    layers['dest']=dm;
    const dl=L.marker(destCoords,{icon:L.divIcon({html:`<div style="background:rgba(10,14,20,0.9);color:#ffcc00;font-family:monospace;font-size:10px;font-weight:bold;padding:2px 6px;border:1px solid #ffcc00">${f.dest}</div>`,className:'',iconAnchor:[0,10]})}).addTo(map);
    layers['destlbl']=dl;
  }

  // Fit view — only to confirmed positions
  if (coords.length===1) {
    map.setView(coords[0], 8);
  } else {
    map.fitBounds(L.latLngBounds(coords), {padding:[50,50],maxZoom:11});
  }
}

function toggleAll() {
  showAll = !showAll;
  const btn = document.getElementById('btn-all');
  if (showAll) {
    btn.textContent='Show Selected'; btn.classList.add('active');
    renderAllMap();
  } else {
    btn.textContent='Show All'; btn.classList.remove('active');
    if(selected) renderMap(selected);
  }
}

function renderAllMap() {
  clearMap();
  map.invalidateSize();
  const colors=['#00d4ff','#39ff14','#ff6b35','#ffcc00','#7b68ee','#ff2244','#00ffcc','#ff69b4'];
  let ci=0, allCoords=[];

  Object.entries(flights).forEach(([k,f])=>{
    if(!f.pos.length)return;
    const color=colors[ci%colors.length]; ci++;
    const coords=f.pos.map(p=>[p.lat,p.lon]);
    allCoords.push(...coords);

    if(coords.length>1){
      L.polyline(coords,{color,weight:2,opacity:0.8}).addTo(map);
    }
    coords.forEach((c,i)=>{
      const isLast=i===coords.length-1;
      const p=f.pos[i];
      const popup=`<div style="font-family:monospace;font-size:11px;background:#0d1117;color:#c8d8e8;padding:6px"><b style="color:${color}">${f.flight}</b><br>${f.route||''}<br>Alt: ${p.alt?p.alt.toLocaleString()+' ft':'N/A'}</div>`;
      if (isLast) {
        const hdg = p.hdg != null ? p.hdg : (f.pos.length >= 2 ? trackBearing(f.pos[f.pos.length-2], p) : 0);
        L.marker(c,{icon:airplaneIcon(color,hdg)})
          .bindPopup(popup,{className:'dark-popup'}).addTo(map);
      } else {
        L.circleMarker(c,{radius:isLast?7:4,color,fillColor:color,fillOpacity:1,weight:2})
          .bindPopup(popup,{className:'dark-popup'}).addTo(map);
      }
    });

    // Label at last position
    const last=coords[coords.length-1];
    L.marker(last,{icon:L.divIcon({
      html:`<div style="background:rgba(10,14,20,0.9);color:${color};font-family:monospace;font-size:10px;font-weight:bold;padding:2px 6px;border:1px solid ${color};white-space:nowrap">${f.flight}</div>`,
      className:'',iconAnchor:[-4,10]
    })}).addTo(map);
  });

  if(allCoords.length>0){
    map.fitBounds(L.latLngBounds(allCoords),{padding:[40,40],maxZoom:9});
  }
}

// ── DETAIL PANEL ──────────────────────────────────────────────────
function renderDetail(key) {
  const f = flights[key];
  const topFreq = Object.entries(f.freqs).sort((a,b)=>b[1]-a[1])[0]?.[0];
  const avgLvl = (f.msgs.reduce((s,m)=>s+m.lvl,0)/f.msgs.length).toFixed(1);

  // INFO TAB
  const labelCounts = {};
  f.msgs.forEach(m=>labelCounts[m.label]=(labelCounts[m.label]||0)+1);
  const labelRows = Object.entries(labelCounts).sort((a,b)=>b[1]-a[1]).map(([l,c])=>
    `<div class="drow"><span class="drow-label">${l} — ${labelDesc(l)}</span><span class="drow-value">${c}</span></div>`
  ).join('');

  document.getElementById('tab-info').innerHTML = `
    <div style="font-size:22px;font-weight:700;color:#fff;margin-bottom:4px">${f.flight}</div>
    <div style="font-family:monospace;font-size:11px;color:#00d4ff;margin-bottom:12px">${f.reg}</div>
    ${f.route?`<div class="drow"><span class="drow-label">Route</span><span class="drow-value">${f.route}</span></div>`:''}
    <div class="drow"><span class="drow-label">Messages</span><span class="drow-value">${f.msgs.length}</span></div>
    <div class="drow"><span class="drow-label">Position fixes</span><span class="drow-value">${f.pos.length}</span></div>
    <div class="drow"><span class="drow-label">Max altitude</span><span class="drow-value">${f.maxAlt?f.maxAlt.toLocaleString()+' ft':'N/A'}</span></div>
    <div class="drow"><span class="drow-label">Avg signal</span><span class="drow-value">${avgLvl} dBm</span></div>
    <div class="drow"><span class="drow-label">Primary freq</span><span class="drow-value">${topFreq} MHz</span></div>
    <div class="drow"><span class="drow-label">First seen</span><span class="drow-value">${f.first}</span></div>
    <div class="drow"><span class="drow-label">Last seen</span><span class="drow-value">${f.last}</span></div>
    <div class="dsection">Message types</div>
    ${labelRows}
  `;

  // DECODED TAB
  const decoded = f.msgs.map(m=>{
    const lines = decodeMsg(m);
    const cls = ['80','16','21','22','36','37','83'].includes(m.label)?'pos':m.label==='SA'?'fuel':m.label==='H1'&&m.body.includes('SNAPSHOT')?'engine':'';
    return `<div class="msg-block ${cls}">
      <div class="msg-time">${m.ts} · ${m.freq}MHz · ${m.lvl}dBm</div>
      <span class="msg-label">${m.label}</span> <span style="font-size:10px;color:#4a6080">${labelDesc(m.label)}</span>
      ${lines}
    </div>`;
  }).join('');
  document.getElementById('tab-decoded').innerHTML = decoded||'<div class="empty">NO MESSAGES</div>';

  // TIMELINE TAB
  const tl = f.msgs.filter(m=>f.pos.some(p=>p.ts===m.ts)||['SA','H1'].includes(m.label)).slice(0,30).map(m=>{
    const isPos=['80','16','21','22','36','37','83'].includes(m.label);
    const color=isPos?'#39ff14':m.label==='SA'?'#ffcc00':'#4a6080';
    return `<div style="padding:6px 0;border-bottom:1px solid #1a2332;display:flex;gap:8px;align-items:flex-start">
      <div style="width:6px;height:6px;border-radius:50%;background:${color};margin-top:4px;flex-shrink:0"></div>
      <div>
        <div style="font-family:monospace;font-size:9px;color:#4a6080">${m.ts}</div>
        <div style="font-size:12px;color:#c8d8e8;font-weight:600">${isPos?'Position report':labelDesc(m.label)}</div>
        ${isPos&&f.pos.find(p=>p.ts===m.ts)?`<div style="font-family:monospace;font-size:10px;color:#4a6080">${f.pos.find(p=>p.ts===m.ts)?.alt?.toLocaleString()||''} ft</div>`:''}
      </div>
    </div>`;
  }).join('');
  document.getElementById('tab-timeline').innerHTML = tl||'<div class="empty">NO TIMELINE</div>';

  // RAW TAB
  const raw = f.msgs.slice(0,50).map(m=>`
    <div class="msg-block">
      <div class="msg-time">${m.ts} · ${m.freq}MHz · ${m.lvl}dBm · E:${m.err}</div>
      <span class="msg-label">${m.label}</span>
      <div class="msg-body">${(m.body||'').trim().slice(0,300)}</div>
    </div>`).join('');
  document.getElementById('tab-raw').innerHTML = raw||'<div class="empty">NO MESSAGES</div>';

  // CHART TAB
  drawChart(f);
}

function decodeMsg(m) {
  const b = m.body||'';
  const rows = [];
  const row = (l,v) => `<div class="drow"><span class="drow-label">${l}</span><span class="drow-value">${v}</span></div>`;

  const rt=b.match(/([A-Z]{4})\/([A-Z]{4})/); if(rt)rows.push(row('✈ Route',`${rt[1]} → ${rt[2]}`));
  const pm=b.match(/\/POS\s+([NS][\d.]+)([EW][\d.]+)/); if(pm)rows.push(row('📍 Position',`${pm[1]} ${pm[2]}`));
  const fl=b.match(/\/FL\s+(\d+)/); if(fl)rows.push(row('⬆ Altitude',`${(+fl[1]*100).toLocaleString()} ft (FL${fl[1]})`));
  const ta=b.match(/\/TAS\s+(\d+)/); if(ta)rows.push(row('💨 Airspeed',`${ta[1]} knots`));
  const mc=b.match(/\/MCH\s+(\d+)/); if(mc)rows.push(row('🚀 Mach',(+mc[1]/1000).toFixed(3)));
  const hd=b.match(/\/HDG\s+(\d+)/); if(hd)rows.push(row('🧭 Heading',`${hd[1]}°`));
  const sa=b.match(/\/SAT\s+([-\d]+)/); if(sa)rows.push(row('🌡 OAT',`${sa[1]}°C`));
  const fb=b.match(/\/FOB\s+[NP]([\d]+)/); if(fb)rows.push(row('⛽ Fuel',`${(+fb[1]).toLocaleString()} lbs`));
  const et=b.match(/\/ETA\s+([\d:.]+)/); if(et)rows.push(row('🕐 ETA',`${et[1]} UTC`));
  const wy=b.match(/\/WYP\s+(\S+)/); if(wy)rows.push(row('◀ Last waypoint',wy[1]));
  const ny=b.match(/\/NWYP\s+(\S+)/); if(ny)rows.push(row('▶ Next waypoint',ny[1]));

  // Label 21
  const p21=b.match(/POSN\s+([\d.]+)([NS])\s+([\d.]+)([EW])/);
  if(p21)rows.push(row('📍 Position',`${p21[1]}°${p21[2]}, ${p21[3]}°${p21[4]}`));

  // Label 36 CSV
  if(m.label==='36'||m.label==='37'){
    const csv=b.trim().split(',');
    if(csv.length>=11){
      rows.push(row('📍 Position',`${csv[6]}°N, ${Math.abs(+csv[7]).toFixed(3)}°W`));
      rows.push(row('⬆ Altitude',`${(+csv[10]*100).toLocaleString()} ft`));
      if(csv[5]?.trim())rows.push(row('🏁 Destination',csv[5].trim()));
      if(csv[13])rows.push(row('🌡 OAT',`${csv[13]}°C`));
      if(csv[14])rows.push(row('⛽ Fuel',`${(+csv[14]).toLocaleString()} lbs`));
    }
  }

  // Engine snapshot
  if(b.includes('SNAPSHOT')){
    rows.push(row('🔧 Type','Engine health snapshot (ACMF)'));
    const sw=b.match(/SWVER\s+([\d.]+)/); if(sw)rows.push(row('💾 SW version',sw[1]));
  }

  // ACK
  if(b.includes('RESP')){
    rows.push(row('📋 Type','Datalink acknowledgement'));
    rows.push(row('✅ Status',b.includes('/AK')?'Acknowledged':'Response sent'));
  }

  if(!rows.length && b.trim()) rows.push(`<div class="msg-body">${b.trim().slice(0,200)}</div>`);
  return rows.join('');
}

function labelDesc(l) {
  const d={'H1':'FMC/free text','80':'Position report','16':'Position report','21':'Position report','22':'Position report','36':'Position report','37':'Position report','83':'Position report','SA':'Fuel & weight','Q0':'Keep-alive ping','B2':'Arrival/departure','5Z':'ATC clearance','B9':'Route clearance','35':'DISTRESS'};
  return d[l]||'Datalink message';
}

// ── CHART ─────────────────────────────────────────────────────────
function drawChart(f) {
  const container = document.getElementById('tab-chart');
  if (!f.pos.length) {
    container.innerHTML = '<div class="empty">NO POSITION DATA</div>';
    return;
  }
  container.innerHTML = '<canvas id="chart-canvas" style="display:block"></canvas>';
  const canvas = document.getElementById('chart-canvas');
  const W = Math.max(document.getElementById('detail').clientWidth || 320, 280);
  const H = 220;
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');

  const pts = f.pos.map(p => ({
    t: (m => m ? (+m[1])*3600 + (+m[2])*60 + (+m[3]) : NaN)(p.ts.match(/(\d{2}):(\d{2}):(\d{2})/)),
    alt: p.alt, tas: p.tas, fob: p.fob
  })).filter(p => !isNaN(p.t));

  if (!pts.length) { container.innerHTML = '<div class="empty">NO POSITION DATA</div>'; return; }

  const PAD = { top: 28, right: 58, bottom: 22, left: 48 };
  const cW = W - PAD.left - PAD.right;
  const cH = H - PAD.top - PAD.bottom;

  const tMin = pts[0].t, tMax = pts[pts.length - 1].t;
  const tRange = tMax - tMin || 1;

  const alts  = pts.map(p => p.alt).filter(v => v != null);
  const tases = pts.map(p => p.tas).filter(v => v != null);
  const fobs  = pts.map(p => p.fob).filter(v => v != null);

  const altMax   = alts.length  ? Math.max(...alts)  * 1.1 : 40000;
  const speedMax = tases.length ? Math.max(...tases) * 1.1 : 600;
  const fobMax   = fobs.length  ? Math.max(...fobs)  * 1.1 : 100000;

  const xOf  = t => PAD.left + (t - tMin) / tRange * cW;
  const yAlt = v => PAD.top + cH - (v / altMax)   * cH;
  const ySpd = v => PAD.top + cH - (v / speedMax) * cH;
  const yFob = v => PAD.top + cH - (v / fobMax)   * cH;

  // Grid
  ctx.lineWidth = 0.5;
  [0.25, 0.5, 0.75, 1].forEach(frac => {
    ctx.strokeStyle = '#1a2332';
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(PAD.left, PAD.top + cH * (1 - frac));
    ctx.lineTo(PAD.left + cW, PAD.top + cH * (1 - frac));
    ctx.stroke();
  });

  // Altitude filled area
  if (alts.length) {
    const ap = pts.filter(p => p.alt != null);
    ctx.beginPath();
    ctx.moveTo(xOf(ap[0].t), yAlt(ap[0].alt));
    ap.forEach(p => ctx.lineTo(xOf(p.t), yAlt(p.alt)));
    ctx.lineTo(xOf(ap[ap.length - 1].t), PAD.top + cH);
    ctx.lineTo(xOf(ap[0].t), PAD.top + cH);
    ctx.closePath();
    ctx.fillStyle = 'rgba(123,104,238,0.12)';
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(xOf(ap[0].t), yAlt(ap[0].alt));
    ap.forEach(p => ctx.lineTo(xOf(p.t), yAlt(p.alt)));
    ctx.strokeStyle = '#7b68ee';
    ctx.lineWidth = 2;
    ctx.setLineDash([]);
    ctx.stroke();
  }

  // Speed dashed line
  if (tases.length) {
    const sp = pts.filter(p => p.tas != null);
    ctx.beginPath();
    ctx.moveTo(xOf(sp[0].t), ySpd(sp[0].tas));
    sp.forEach(p => ctx.lineTo(xOf(p.t), ySpd(p.tas)));
    ctx.strokeStyle = '#00d4ff';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 3]);
    ctx.stroke();
  }

  // Fuel dashed line
  if (fobs.length) {
    const fp = pts.filter(p => p.fob != null);
    ctx.beginPath();
    ctx.moveTo(xOf(fp[0].t), yFob(fp[0].fob));
    fp.forEach(p => ctx.lineTo(xOf(p.t), yFob(p.fob)));
    ctx.strokeStyle = '#ffcc00';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([3, 4]);
    ctx.stroke();
  }

  ctx.setLineDash([]);

  // Left Y-axis labels (altitude in FL)
  if (alts.length) {
    ctx.font = '9px monospace';
    ctx.textAlign = 'right';
    [0.25, 0.5, 0.75, 1].forEach(frac => {
      ctx.fillStyle = '#7b68ee';
      ctx.fillText('FL' + Math.round(altMax * frac / 100), PAD.left - 4, PAD.top + cH * (1 - frac) + 3);
    });
  }

  // Right Y-axis labels (speed in kts)
  if (tases.length) {
    ctx.fillStyle = '#00d4ff';
    ctx.textAlign = 'left';
    [0.5, 1].forEach(frac => {
      ctx.fillText(Math.round(speedMax * frac) + 'kt', PAD.left + cW + 4, PAD.top + cH * (1 - frac) + 3);
    });
  }

  // Right Y-axis fuel label
  if (fobs.length) {
    ctx.fillStyle = '#ffcc00';
    ctx.textAlign = 'left';
    ctx.fillText(Math.round(fobMax).toLocaleString() + 'lb', PAD.left + cW + 4, PAD.top + 3);
  }

  // X-axis time labels
  const fmt = t => `${String(Math.floor(t/3600)).padStart(2,'0')}:${String(Math.floor((t%3600)/60)).padStart(2,'0')}`;
  ctx.fillStyle = '#4a6080';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(fmt(tMin), PAD.left, H - 4);
  ctx.fillText(fmt((tMin + tMax) / 2), PAD.left + cW / 2, H - 4);
  ctx.fillText(fmt(tMax), PAD.left + cW, H - 4);

  // Legend
  let lx = PAD.left;
  const legends = [];
  if (alts.length)  legends.push({ color: '#7b68ee', label: 'Alt',   dash: false });
  if (tases.length) legends.push({ color: '#00d4ff', label: 'Speed', dash: true  });
  if (fobs.length)  legends.push({ color: '#ffcc00', label: 'Fuel',  dash: true  });
  ctx.font = '9px monospace';
  legends.forEach(leg => {
    ctx.strokeStyle = leg.color;
    ctx.lineWidth = 1.5;
    ctx.setLineDash(leg.dash ? [4, 2] : []);
    ctx.beginPath(); ctx.moveTo(lx, 14); ctx.lineTo(lx + 14, 14); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = leg.color;
    ctx.textAlign = 'left';
    ctx.fillText(leg.label, lx + 17, 18);
    lx += 14 + ctx.measureText(leg.label).width + 18;
  });
}

// ── STATS ─────────────────────────────────────────────────────────
function updateStats() {
  const keys=Object.keys(flights);
  const total=keys.reduce((s,k)=>s+flights[k].msgs.length,0);
  document.getElementById('s-flights').textContent=keys.length;
  document.getElementById('s-msgs').textContent=total;
  if(keys.length){
    const all=keys.flatMap(k=>flights[k].msgs);
    const times=all.map(m=>m.ts).sort();
    const s=times[0]?.split(' ')[1]?.slice(0,5);
    const e=times[times.length-1]?.split(' ')[1]?.slice(0,5);
    document.getElementById('s-dur').textContent=s&&e?`${s}–${e}`:'--';
    const fc={};all.forEach(m=>fc[m.freq]=(fc[m.freq]||0)+1);
    const tf=Object.entries(fc).sort((a,b)=>b[1]-a[1])[0]?.[0];
    document.getElementById('s-freq').textContent=tf?tf+' MHz':'--';
    document.getElementById('s-dot').style.background='#39ff14';
    document.getElementById('s-dot').style.boxShadow='0 0 6px #39ff14';
    document.getElementById('drop-overlay').style.display='none';
    document.getElementById('btn-clear').style.display='inline-block';
    document.getElementById('btn-all').style.display='inline-block';
  }
}

// ── FILE HANDLING ─────────────────────────────────────────────────
function loadFile(file) {
  const r=new FileReader();
  r.onload=e=>{
    parseLog(e.target.result);
    updateStats();
    renderList();
    const first=Object.keys(flights).find(k=>flights[k].pos.length>0)||Object.keys(flights)[0];
    if(first) select(first);
  };
  r.readAsText(file);
}

document.getElementById('file-input').addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0]);});

// ── CLEAR ─────────────────────────────────────────────────────────
function clearAll() {
  flights={}; selected=null; showAll=false;
  clearMap();
  map.setView([39.5,-76],7);
  document.getElementById('flight-list').innerHTML='<div class="empty">LOAD AN ACARSDEC LOG FILE</div>';
  document.getElementById('flight-count').textContent='0';
  document.getElementById('s-flights').textContent='0';
  document.getElementById('s-msgs').textContent='0';
  document.getElementById('s-dur').textContent='--';
  document.getElementById('s-freq').textContent='--';
  document.getElementById('s-dot').style.background='#4a6080';
  document.getElementById('s-dot').style.boxShadow='none';
  document.getElementById('drop-overlay').style.display='flex';
  document.getElementById('btn-clear').style.display='none';
  document.getElementById('btn-all').style.display='none';
  document.getElementById('btn-all').textContent='Show All';
  document.getElementById('btn-all').classList.remove('active');
  document.getElementById('file-input').value='';
  ['tab-info','tab-decoded','tab-timeline','tab-raw','tab-chart'].forEach(id=>document.getElementById(id).innerHTML='<div class="empty">SELECT A FLIGHT</div>');
}

// ── TABS ──────────────────────────────────────────────────────────
document.querySelectorAll('.dtab').forEach(t=>t.addEventListener('click',()=>{
  const tab=t.dataset.tab;
  document.querySelectorAll('.dtab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if (tab==='chart' && selected) drawChart(flights[selected]);
}));

// ── INIT ──────────────────────────────────────────────────────────
window.addEventListener('load',()=>requestAnimationFrame(()=>requestAnimationFrame(initMap)));
